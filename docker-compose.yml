version: "3.9"

# ================================================================
#  Urbani Kiosco — stack de producción
#
#  Servicios:
#    db      → PostgreSQL 15
#    api     → FastAPI + Gunicorn/Uvicorn (4 workers)
#    kiosk   → React SPA build estático servida por nginx interno
#    nginx   → Reverse proxy público (puerto 80)
#
#  Uso:
#    cp .env.example .env          # ajustar variables
#    docker compose up -d --build
# ================================================================

services:

  # ── Base de datos ────────────────────────────────────────────
  db:
    image: postgres:15
    container_name: urbani-kiosco-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-urbani_kiosco}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-urbani_kiosco}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No exponer el puerto 5432 al host en producción
    expose:
      - "5432"

  # ── API FastAPI ──────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: urbani-kiosco-api
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-urbani_kiosco}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend kiosco (SPA compilada) ─────────────────────────
  kiosk:
    build:
      context: ./apps/kiosk-web
      dockerfile: Dockerfile
    container_name: urbani-kiosco-kiosk
    restart: unless-stopped
    expose:
      - "80"

  # ── Nginx reverse proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: urbani-kiosco-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # Para HTTPS descomenta y agrega certificados:
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - kiosk

volumes:
  postgres_data:
