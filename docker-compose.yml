version: "3.9"

services:
  db:
    image: postgres:15
    container_name: urbani-kiosco-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urbani_kiosco
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urbani_kiosco"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
