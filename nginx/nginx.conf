# ==============================================================
#  nginx.conf — Urbani Kiosco producción
#
#  /          → portal de herramientas (API /tools)
#  /kiosk-ui  → kiosco SPA (contenedor kiosk:80)
#  /api/      → FastAPI Gunicorn (contenedor api:8000)
#  /dashboard → archivos estáticos servidos por API
#  /static/   → archivos estáticos servidos por API
# ==============================================================

upstream api_backend {
    server api:8000;
    keepalive 32;
}

upstream kiosk_frontend {
    server kiosk:80;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    # ── gzip ────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── API (proxy pass) ────────────────────────────────────
    location /api/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts generosos para llamadas LLM
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # ── Health check ─────────────────────────────────────────
    location /health {
        proxy_pass http://api_backend/health;
        proxy_set_header Host $host;
    }

    # ── Dashboards y portal (servidos por API) ──
    location /dashboard {
        proxy_pass         http://api_backend/dashboard;
        proxy_set_header   Host $host;
    }
    location /executive-dashboard {
        proxy_pass         http://api_backend/executive-dashboard;
        proxy_set_header   Host $host;
    }
    location /supervisor-dashboard {
        proxy_pass         http://api_backend/supervisor-dashboard;
        proxy_set_header   Host $host;
    }
    location /tools {
        proxy_pass         http://api_backend/tools;
        proxy_set_header   Host $host;
    }
    location = /docs {
        proxy_pass         http://api_backend/docs;
        proxy_set_header   Host $host;
    }
    location /static/ {
        proxy_pass         http://api_backend/static/;
        proxy_set_header   Host $host;
        expires 1h;
    }

    # ── Kiosco SPA (proxy al contenedor kiosk) ──────────────
    location = /kiosk-ui {
        return 302 /kiosk-ui/;
    }
    location /assets/ {
        proxy_pass         http://kiosk_frontend/assets/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Home (portal con accesos) ────────────────────────────
    location = / {
        proxy_pass         http://api_backend/tools;
        proxy_set_header   Host $host;
    }

    # ── fallback kiosco (opcional, para abrirlo por /kiosk-ui/*) ──
    location /kiosk-ui/ {
        proxy_pass         http://kiosk_frontend/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
    }

    # ── fallback general al kiosco (solo si no matcheó arriba) ───
    location / {
        proxy_pass         http://kiosk_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        # Cache de assets con hash (immutable)
        location ~* \.(js|css|png|jpg|svg|woff2?)$ {
            proxy_pass http://kiosk_frontend;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    client_max_body_size 5m;
}

