<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urbani Ejecutivo</title>
  <style>
    :root{
      --bg:#f4f7fa;
      --card:#ffffff;
      --line:#d9e3ea;
      --ink:#1d2a33;
      --muted:#5d7482;
      --brand:#0b89ac;
      --ok:#3a9c5b;
      --warn:#b8871d;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:"Segoe UI",sans-serif;padding:18px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;gap:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
    .header{display:flex;justify-content:space-between;align-items:center}
    .title{font-size:24px;font-weight:700}
    .meta{font-size:13px;color:var(--muted)}
    .state{font-weight:700}
    .state.available{color:var(--ok)}
    .state.called{color:var(--brand)}
    .state.in_service{color:var(--warn)}
    .primary{
      width:100%;min-height:72px;border:none;border-radius:14px;background:var(--brand);color:#fff;
      font-weight:800;font-size:28px;cursor:pointer
    }
    .primary:disabled{opacity:.45;cursor:not-allowed}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{min-height:52px;padding:0 20px;border-radius:12px;border:1px solid var(--line);background:#fff;font-weight:700;cursor:pointer}
    .btn.ok{background:#eaf8ee;border-color:#cbe9d4;color:#1e6f3b}
    .btn.end{background:#fff4df;border-color:#f2dab0;color:#8a6206}
    .btn.warn{background:#ffecee;border-color:#f7c4cb;color:#a43245}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left}
    th{font-size:13px;color:var(--muted)}
    .pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:700}
    .pill.yes{background:#e8f7ec;color:#1f7a42}
    .pill.no{background:#f2f5f7;color:#667985}
  </style>
</head>
<body>
  <main class="wrap">
    <section id="loginCard" class="card" style="max-width:520px;margin:40px auto;display:none">
      <div class="title" style="font-size:30px">Ingreso Ejecutivo</div>
      <div class="meta" style="margin-top:6px">Accede con tu correo autorizado (sin contraseña)</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">
        <input id="loginEmail" type="email" placeholder="correo@empresa.cl" style="flex:1;min-height:48px;padding:0 12px;border:1px solid var(--line);border-radius:10px" />
        <button id="loginBtn" class="btn ok" style="min-width:130px">Ingresar</button>
      </div>
      <div id="loginError" class="meta" style="margin-top:10px;color:#a43245"></div>
    </section>

    <section id="appShell" style="display:none">
      <section class="card header">
      <div>
        <div class="title">Dashboard Ejecutivo</div>
        <div class="meta">Operacion de turnos en tiempo real | <span id="userLabel">-</span></div>
      </div>
      <div style="text-align:right">
        <button id="logoutBtn" class="btn" style="min-height:38px;margin-bottom:6px">Logout</button>
        <div id="stateText" class="state available">Disponible</div>
        <div id="queueStats" class="meta">Esperando: 0</div>
      </div>
      </section>

      <section class="card">
      <div id="currentEmpty" class="meta">Sin turno en atencion</div>
      <div id="currentPanel" style="display:none">
        <div style="font-size:54px;font-weight:900;line-height:1" id="currentTicket">A-00</div>
        <div class="meta" id="currentInfo">Cliente: N/D</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center">
          <span class="meta">RUT:</span>
          <code id="currentRut" style="background:#f2f6fa;border-radius:6px;padding:4px 8px">-</code>
          <button class="btn" id="copyRutBtn">Copiar RUT</button>
          <span class="meta">Perfilado:</span>
          <strong id="currentProfiled">No</strong>
        </div>
        <div class="meta" style="margin-top:8px">Opciones elegidas</div>
        <div id="currentProfile" style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center">
          <span class="meta">Transferir a:</span>
          <input id="transferTo" value="exec-2" style="height:38px;padding:0 10px;border:1px solid var(--line);border-radius:8px"/>
          <button class="btn" id="transferBtn">Transferir turno</button>
        </div>
        <div class="actions" style="margin-top:12px">
          <button class="btn ok" id="startBtn">Iniciar atencion</button>
          <button class="btn end" id="finishBtn">Finalizar atencion</button>
          <button class="btn warn" id="abandonBtn">Marcar abandonado</button>
        </div>
      </div>
      </section>

      <section class="card">
      <button class="primary" id="callNextBtn">LLAMAR SIGUIENTE</button>
      </section>

      <section class="card">
      <h3 style="margin:0 0 10px">Cola de espera</h3>
      <table>
        <thead>
          <tr><th>Turno</th><th>Tiempo esperando (min)</th><th>Perfilado</th></tr>
        </thead>
        <tbody id="queueBody"></tbody>
      </table>
      </section>
    </section>
  </main>

  <script>
    const API = "/api/v1";
    let current = null;
    const AUTH_STORAGE_KEY = "urbani_exec_auth";
    let authState = null;
    const QUEUE_SCOPE = "kiosk-";
    const PRIORITY_MODE = "smart";

    function getExecutiveId() {
      return authState?.user?.email || "exec-unknown";
    }

    function executiveDisplayNameFromEmail(email) {
      const local = String(email || "").split("@")[0] || "";
      const cleaned = local.replace(/[._-]+/g, " ").trim();
      if (!cleaned) return "Ejecutivo";
      return cleaned
        .split(" ")
        .filter(Boolean)
        .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
        .join(" ");
    }

    function showLogin() {
      document.getElementById("loginCard").style.display = "block";
      document.getElementById("appShell").style.display = "none";
    }

    function showApp() {
      document.getElementById("loginCard").style.display = "none";
      document.getElementById("appShell").style.display = "block";
      const name = authState?.user?.name || executiveDisplayNameFromEmail(authState.user.email);
      document.getElementById("userLabel").textContent = `${name} | ${authState.user.email} (${authState.user.role})`;
    }

    function loadAuthState() {
      try {
        const raw = localStorage.getItem(AUTH_STORAGE_KEY);
        authState = raw ? JSON.parse(raw) : null;
      } catch {
        authState = null;
      }
    }

    function saveAuthState(state) {
      authState = state;
      localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(state));
    }

    function clearAuthState() {
      authState = null;
      localStorage.removeItem(AUTH_STORAGE_KEY);
    }

    async function req(path, options = {}) {
      const headers = {
        "Content-Type": "application/json",
        ...(options.headers || {}),
      };
      if (authState?.access_token) {
        headers.Authorization = `Bearer ${authState.access_token}`;
      }
      const res = await fetch(`${API}${path}`, {
        ...options,
        headers,
      });
      if (res.status === 401) {
        clearAuthState();
        showLogin();
        throw new Error("Sesion expirada. Vuelve a ingresar.");
      }
      if (!res.ok) {
        let detail = "";
        try {
          const body = await res.json();
          detail = body?.detail ? `: ${body.detail}` : "";
        } catch {}
        throw new Error(`HTTP ${res.status}${detail}`);
      }
      return res.json();
    }

    async function refresh() {
      const scope = encodeURIComponent(QUEUE_SCOPE);
      const waiting = await req(`/queue/tickets?status=waiting&queue_scope=${scope}`);
      const called = await req(`/queue/tickets?status=called&queue_scope=${scope}`);
      const inService = await req(`/queue/tickets?status=in_service&queue_scope=${scope}`);
      const me = getExecutiveId();
      const ownInService = inService.items.find((t) => t.executive_id === me);
      const ownCalled = called.items.find((t) => t.executive_id === me);
      current = ownInService || ownCalled || null;

      const statusText = document.getElementById("stateText");
      const callBtn = document.getElementById("callNextBtn");
      const startBtn = document.getElementById("startBtn");
      const finishBtn = document.getElementById("finishBtn");

      document.getElementById("queueStats").textContent = `Esperando: ${waiting.items.length}`;

      if (!current) {
        statusText.textContent = "Disponible";
        statusText.className = "state available";
        document.getElementById("currentEmpty").style.display = "block";
        document.getElementById("currentPanel").style.display = "none";
        document.getElementById("currentRut").textContent = "-";
        document.getElementById("currentProfiled").textContent = "No";
        document.getElementById("currentProfile").innerHTML = "";
        callBtn.disabled = false;
      } else {
        const isInService = current.status === "in_service";
        statusText.textContent = isInService ? "En atencion" : "Turno llamado";
        statusText.className = `state ${current.status}`;
        document.getElementById("currentEmpty").style.display = "none";
        document.getElementById("currentPanel").style.display = "block";
        document.getElementById("currentTicket").textContent = current.ticket_number;
        document.getElementById("currentInfo").textContent = `Sesion: ${current.session_id}`;
        document.getElementById("currentRut").textContent = current.rut || "-";
        document.getElementById("currentProfiled").textContent = current.profiled ? "Si" : "No";
        const profileNode = document.getElementById("currentProfile");
        profileNode.innerHTML = "";
        const entries = Object.entries(current.profile || {});
        if (entries.length === 0) {
          profileNode.innerHTML = '<span class="meta">Sin respuestas de perfilado.</span>';
        } else {
          entries.forEach(([k, v]) => {
            const item = document.createElement("span");
            item.className = "pill yes";
            item.textContent = `${k}: ${String(v)}`;
            profileNode.appendChild(item);
          });
        }
        callBtn.disabled = true;
        startBtn.disabled = isInService;
        finishBtn.disabled = false;
      }

      const tbody = document.getElementById("queueBody");
      tbody.innerHTML = "";
      const now = new Date();
      waiting.items.forEach((item) => {
        const created = new Date(item.created_at);
        const waitMin = Math.max(0, Math.floor((now - created) / 60000));
        const tr = document.createElement("tr");
        const pill = item.profiled
          ? '<span class="pill yes">Si</span>'
          : '<span class="pill no">No</span>';
        tr.innerHTML = `
          <td>${item.ticket_number}</td>
          <td>${waitMin}</td>
          <td>${pill}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function callNext() {
      await req("/queue/call-next", {
        method: "POST",
        body: JSON.stringify({
          executive_id: getExecutiveId(),
          queue_scope: QUEUE_SCOPE || null,
          priority_mode: PRIORITY_MODE,
        }),
      });
      await refresh();
    }

    async function updateCurrent(status) {
      if (!current) return;
      await req(`/queue/tickets/${current.id}/status`, {
        method: "PATCH",
        body: JSON.stringify({ status, executive_id: getExecutiveId() }),
      });
      await refresh();
    }
    async function transferCurrent() {
      if (!current) return;
      const toExecutive = (document.getElementById("transferTo").value || "").trim();
      if (!toExecutive) {
        alert("Ingresa ejecutivo destino");
        return;
      }
      await req(`/queue/tickets/${current.id}/transfer`, {
        method: "POST",
        body: JSON.stringify({
          from_executive_id: getExecutiveId(),
          to_executive_id: toExecutive,
        }),
      });
      await refresh();
    }

    async function login() {
      const email = (document.getElementById("loginEmail").value || "").trim().toLowerCase();
      if (!email) {
        document.getElementById("loginError").textContent = "Ingresa tu correo";
        return;
      }
      document.getElementById("loginError").textContent = "";
      let result;
      try {
        result = await req("/auth/login", {
          method: "POST",
          body: JSON.stringify({ email }),
        });
      } catch (err) {
        if (String(err.message || "").includes("HTTP 404")) {
          result = await req("/login", {
            method: "POST",
            body: JSON.stringify({ email }),
          });
        } else {
          throw err;
        }
      }
      saveAuthState(result);
      showApp();
      await refresh();
    }

    function logout() {
      clearAuthState();
      showLogin();
      current = null;
      document.getElementById("loginError").textContent = "";
    }

    async function bootstrap() {
      loadAuthState();
      if (!authState?.access_token) {
        showLogin();
        return;
      }
      try {
        const me = await req("/auth/me");
        authState.user = { id: me.user_id, email: me.email, name: me.name || null, role: me.role };
        saveAuthState(authState);
        if (me.role === "supervisor" || me.role === "admin") {
          window.location.href = "/supervisor-dashboard";
          return;
        }
        showApp();
        await refresh();
      } catch {
        showLogin();
      }
    }

    document.getElementById("callNextBtn").onclick = () => callNext().catch((e) => alert(e.message));
    document.getElementById("startBtn").onclick = () => updateCurrent("in_service").catch((e) => alert(e.message));
    document.getElementById("finishBtn").onclick = () => updateCurrent("completed").catch((e) => alert(e.message));
    document.getElementById("abandonBtn").onclick = () => updateCurrent("no_show").catch((e) => alert(e.message));
    document.getElementById("transferBtn").onclick = () => transferCurrent().catch((e) => alert(e.message));
    document.getElementById("copyRutBtn").onclick = async () => {
      const value = document.getElementById("currentRut").textContent || "";
      if (!value || value === "-") return;
      try { await navigator.clipboard.writeText(value); } catch {}
    };
    document.getElementById("loginBtn").onclick = () => login().catch((e) => {
      document.getElementById("loginError").textContent = e.message || "No se pudo ingresar";
    });
    document.getElementById("logoutBtn").onclick = () => logout();
    document.getElementById("loginEmail").addEventListener("keydown", (e) => {
      if (e.key === "Enter") login().catch((err) => {
        document.getElementById("loginError").textContent = err.message || "No se pudo ingresar";
      });
    });

    bootstrap();
    setInterval(() => {
      if (authState?.access_token) refresh().catch(() => null);
    }, 5000);
  </script>
</body>
</html>
